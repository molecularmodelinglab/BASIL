name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.clean-version.outputs.version }}
    steps:
      - name: Clean version (remove 'v' prefix if present)
        id: clean-version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name || '1.0.0' }}"
          CLEAN_VERSION="${VERSION#v}"
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

  build-windows:
    needs: prepare-version
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x86, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build application
        run: |
          poetry run python build.py --version ${{ needs.prepare-version.outputs.version }} --tag-output --clean

      - name: Create Inno Setup script
        run: |
          $version = "${{ needs.prepare-version.outputs.version }}"
          $appFolder = "dist\BASIL-v$version"

          @"
          [Setup]
          AppName=BASIL
          AppVersion=$version
          AppPublisher=BASIL
          DefaultDirName={autopf}\BASIL
          DefaultGroupName=BASIL
          OutputDir=dist
          OutputBaseFilename=BASIL-v$version-setup-${{ matrix.architecture }}
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=${{ matrix.architecture == 'x64' && 'x64' || '' }}
          ArchitecturesInstallIn64BitMode=${{ matrix.architecture == 'x64' && 'x64' || '' }}

          [Files]
          Source: "$appFolder\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\BASIL"; Filename: "{app}\BASIL.exe"
          Name: "{autodesktop}\BASIL"; Filename: "{app}\BASIL.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          "@ | Out-File -FilePath "setup.iss" -Encoding ASCII

      - name: Build Windows installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.architecture }}
          path: dist/BASIL-v${{ needs.prepare-version.outputs.version }}-setup-${{ matrix.architecture }}.exe

  build-macos-arm64:
    needs: prepare-version
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UPX
        run: brew install upx

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build ARM64 application
        env:
          MACOSX_DEPLOYMENT_TARGET: '12.0'
        run: |
          poetry run python build.py --version ${{ needs.prepare-version.outputs.version }} --tag-output --clean --bundle-id com.basil.app

      - name: Remove Quarantine Attributes
        run: |
          xattr -cr "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" 2>/dev/null || true

      - name: Install DMG creator
        run: brew install create-dmg

      - name: Create ARM64 DMG
        run: |
          hdiutil detach /Volumes/BASIL 2>/dev/null || true
          rm -rf dist/dmg
          rm -f "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon.dmg"

          mkdir -p dist/dmg
          cp -a "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" dist/dmg/BASIL.app

          create-dmg \
            --volname "BASIL" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BASIL.app" 175 190 \
            --hide-extension "BASIL.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon.dmg" \
            "dist/dmg/" || hdiutil create -volname "BASIL" -srcfolder dist/dmg -ov -format UDZO "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon.dmg"

      - name: Upload ARM64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*-apple-silicon.dmg

  build-macos-arm64-macos12:
    needs: prepare-version
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          brew update
          brew install upx create-dmg

      - name: Install Poetry and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry install

      - name: Force SciPy macOS 12 arm64 wheel
        run: |
          set -e

          SCIPY_VERSION=$(poetry run python - << 'EOF'
          try:
              import importlib.metadata as m
              print(m.version("scipy"))
          except Exception:
              print("")
          EOF
          )

          if [ -z "$SCIPY_VERSION" ]; then
            SCIPY_VERSION="1.16.2"
          fi

          TMPDIR=$(mktemp -d)

          poetry run python -m pip download \
            "scipy==${SCIPY_VERSION}" \
            --only-binary=scipy \
            --platform macosx_12_0_arm64 \
            --implementation cp \
            --python-version 3.11 \
            --abi cp311 \
            --no-deps \
            -d "$TMPDIR"

          WHEEL=$(ls "$TMPDIR"/scipy-"${SCIPY_VERSION}"-*.whl | head -1 || true)
          if [ -z "$WHEEL" ]; then
            echo "ERROR: No SciPy wheel found for macOS 12 arm64"
            exit 1
          fi

          poetry run python -m pip uninstall -y scipy || true
          poetry run python -m pip install --no-deps "$WHEEL"

      - name: Build ARM64 macOS 12 application
        env:
          MACOSX_DEPLOYMENT_TARGET: '12.0'
        run: |
          poetry run python build.py \
            --version ${{ needs.prepare-version.outputs.version }} \
            --tag-output --clean \
            --bundle-id com.basil.app.macos12

      - name: Remove quarantine attributes
        run: |
          xattr -cr "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" 2>/dev/null || true

      - name: Create macOS 12 DMG
        run: |
          hdiutil detach /Volumes/BASIL 2>/dev/null || true
          rm -rf dist/dmg
          rm -f "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon-macos12.dmg"

          mkdir -p dist/dmg
          cp -a "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" dist/dmg/BASIL.app

          create-dmg \
            --volname "BASIL" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BASIL.app" 175 190 \
            --hide-extension "BASIL.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon-macos12.dmg" \
            "dist/dmg/" \
          || hdiutil create \
              -volname "BASIL" \
              -srcfolder dist/dmg \
              -ov -format UDZO \
              "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-apple-silicon-macos12.dmg"

      - name: Upload macOS 12 DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-macos12
          path: dist/*-apple-silicon-macos12.dmg

  build-macos-intel:
    needs: prepare-version
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UPX
        run: brew install upx

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Build x86_64 application
        env:
          MACOSX_DEPLOYMENT_TARGET: '12.0'
        run: |
          poetry run python build.py --version ${{ needs.prepare-version.outputs.version }} --tag-output --clean --bundle-id com.basil.app

      - name: Remove Quarantine Attributes
        run: |
          xattr -cr "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" 2>/dev/null || true

      - name: Install DMG creator
        run: brew install create-dmg

      - name: Create Intel DMG
        run: |
          hdiutil detach /Volumes/BASIL 2>/dev/null || true
          rm -rf dist/dmg
          rm -f "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-intel-mac.dmg"

          mkdir -p dist/dmg
          cp -a "dist/BASIL-v${{ needs.prepare-version.outputs.version }}.app" dist/dmg/BASIL.app

          create-dmg \
            --volname "BASIL" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BASIL.app" 175 190 \
            --hide-extension "BASIL.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-intel-mac.dmg" \
            "dist/dmg/" || hdiutil create -volname "BASIL" -srcfolder dist/dmg -ov -format UDZO "dist/BASIL-v${{ needs.prepare-version.outputs.version }}-intel-mac.dmg"

      - name: Upload Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: dist/*-intel-mac.dmg

  build-linux:
    needs: prepare-version
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            desktop-file-utils \
            file \
            upx \
            wget

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: |
          poetry config installer.max-workers 1
          poetry install --no-cache

      - name: Force CPU-only PyTorch
        run: |
          poetry run pip install --index-url https://download.pytorch.org/whl/cpu \
            --upgrade --force-reinstall torch

      - name: Build Linux application
        run: |
          poetry run python build.py --version ${{ needs.prepare-version.outputs.version }} --tag-output --clean

      - name: Cleanup after build
        run: |
          rm -rf ~/.cache/pypoetry

          rm -rf ~/.cache/pip

          poetry run python -m pip cache purge || true

          sudo apt-get clean
          sudo apt-get autoclean

          sudo journalctl --vacuum-time=1d || true

          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*


      - name: Download AppImage tools
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/BASIL-v${{ needs.prepare-version.outputs.version }}/* AppDir/usr/bin/
          find AppDir/usr/bin -name "libpython*.so*" -exec cp {} AppDir/usr/lib/ \;

          if [ -f assets/icons/icon.png ]; then
            cp assets/icons/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/basil.png
            cp assets/icons/icon.png AppDir/basil.png
          fi

          cat > AppDir/usr/share/applications/basil.desktop << 'EOF'
          [Desktop Entry]
          Name=BASIL
          Exec=BASIL
          Icon=basil
          Type=Application
          Categories=Science;Education;
          Terminal=false
          Comment=BASIL Application
          EOF

          cp AppDir/usr/share/applications/basil.desktop AppDir/basil.desktop

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/bin:${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/BASIL" "$@"
          EOF
          chmod +x AppDir/AppRun
          chmod +x AppDir/usr/bin/BASIL

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir BASIL-v${{ needs.prepare-version.outputs.version }}-x86_64.AppImage
          chmod +x BASIL-v${{ needs.prepare-version.outputs.version }}-x86_64.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: BASIL-*.AppImage

  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-intel, build-linux, build-macos-arm64-macos12]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-x86/*.exe
            windows-x64/*.exe
            macos-arm64/*.dmg
            macos-arm64-macos12/*.dmg
            macos-intel/*.dmg
            linux-x86_64/*.AppImage
          body: |
            ## macOS Users
            - **Apple Silicon (M1/M2/M3/M4)**:
              - For macOS 13+ (Ventura and newer): Download `*-apple-silicon.dmg`
              - For macOS 12 (Monterey): Download `*-apple-silicon-macos12.dmg`
            - **Intel Mac**: Download `*-intel-mac.dmg`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
